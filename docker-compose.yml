services:

  postgres:
    image: postgres:16-alpine          
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"                    
    volumes:
      - postgres_data:/var/lib/postgresql/data   
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy     # waits until postgres passes healthcheck
    environment:
      PORT:        ${PORT}
      DB_HOST:     postgres            # <-- this is the key: use the service name, not localhost
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_ENV:    development
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app                         # mounts your code into the container
      - /app/node_modules              # keeps container's node_modules separate
    networks:
      - ecommerce-network
    command: npm run dev               # uses nodemon for hot reload

volumes:
  postgres_data:                       # named volume — survives container restarts

networks:
  ecommerce-network:
    driver: bridge